services:
  db:
    image: postgres:16
    container_name: taskbot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskbot"]
      interval: 5s
      timeout: 3s
      retries: 20

  bot_metalead:
    build: .
    container_name: bot_metalead
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./:/app
    command: ["python", "-m", "src.bot_metalead"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: